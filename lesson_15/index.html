<!DOCTYPE html>
<html lang="zxx">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <title>Lesson-15__adaptive</title>
</head>
<body>
  <div class="wrapper">
    <header class="header">
      <div class="header__top top">
        <div class="top__container">
          <a href="#" class="top__link">
            <img src="img/menu-burger.svg" alt="menu" class="top__burger-menu">
          </a>
          <a href="#" class="top__link">
            <img src="img/header-logo.svg" alt="logo" class="top__logo">
          </a>
          <a href="tel:0679294545" class="top__link">
            <img src="img/tel.svg" alt="tel" class="top__icon-tel">
          </a>
          <div class="header__left-side">
            <ul class="header__menu menu">
              <li class="menu__item">
                <a href="#" class="menu__link">
                  Про нас
                </a>
              </li>
              <li class="menu__item">
                <a href="#" class="menu__link">
                  Оплата
                </a>
              </li>
              <li class="menu__item">
                <a href="#" class="menu__link">
                  Доставка та збірка
                </a>
              </li>
              <li class="menu__item">
                <a href="#" class="menu__link">
                  Відгуки
                </a>
              </li>
              <li class="menu__item">
                <a href="#" class="menu__link">
                  Блог
                </a>
              </li>
              <li class="menu__item">
                <a href="#" class="menu__link">
                  Контакти
                </a>
              </li>
            </ul>
          </div>
          <div class="header__right-side">
            <span class="header__help-and-consult">Допомога і консультація:</span>
            <ul class="header__messangers messangers">
              <li class="messangers__item">
                <a href="#" class="messangers__link">
                  <img src="img/whatsapp.svg" alt="whatsapp" class="messangers__icon">
                </a>
              </li>
              <li class="messangers__item">
                <a href="#" class="messangers__link">
                  <img src="img/telegram.svg" alt="telegram" class="messangers__icon">
                </a>
              </li>
              <li class="messangers__item">
                <a href="#" class="messangers__link">
                  <img src="img/viber.svg" alt="viber" class="messangers__icon">
                </a>
              </li>
            </ul>
            <select class="header__languages">
              <option value="UA">UA</option>
              <option value="UA">EN</option>
            </select>
          </div>
        </div>
      </div>
      <div class="header__middle middle">
        <div class="middle__container">
          <a href="#" class="header__link-logo">
            <img src="img/header-logo.svg" alt="logo" class="header__logo">
          </a>
          <div class="middle__left-side">
            <a href="#" class="header__btn btn">
              <span class="btn__catalog">Каталог</span>
            </a>
            <form class="header__search">
              <input type="text" placeholder="Пошук товарів">
              <button type="submit">
                <img src="img/search.svg" alt="Search Icon">
              </button>
            </form>
            <!-- <a href="#" class="middle__link">
              <img src="img/icon-search.svg" alt="icon search" class="middle__icon-search">
            </a> -->
          </div>
          <div class="middle__right-side">
            <a href="tel:0679294545" class="header__icon icon">
              <img src="img/tel.svg" alt="icon tel" class="icon__tel">
            </a>
            <div class="header__contacts contacts">
              <div class="contacts__block">
                <p class="contacts__schedule">
                  Щодня з 9:00 до 18:00
                </p>
                <p class="contacts__tel">
                  067 929-45-45
                </p>
              </div>
              <a href="#" class="contacts__arrow">
                <img src="img/arrow.svg" alt="arrow" class="contacts__arrow-img">
              </a>
            </div>
            <div class="header__shopping shopping">
              <a href="#" class="shopping__link">
                <img src="img/icon-search.svg" alt="icon search" class="shopping__icon shopping__icon--search">
              </a>
              <a href="#" class="shopping__link">
                <img src="img/favorite.svg" alt="favorite" class="shopping__icon">
              </a>
              <a href="#" class="shopping__link">
                <img src="img/basket.svg" alt="favorite" class="shopping__icon">
              </a>
            </div>
          </div>
        </div>
      </div>
      <div class="header__bottom bottom-header">
        <div class="bottom-header__container">
          <ul class="bottom-header__menu-sales menu-sales">
            <li class="menu-sales__item">
              <a href="#" class="menu-sales__link">
                <img class="menu-sales__img" src="img/star.svg" alt="star">
                <span class="menu-sales__text">Акції</span>
              </a>
            </li>
            <li class="menu-sales__item">
              <a href="#" class="menu-sales__link">
                <img class="menu-sales__img" src="img/sale.svg" alt="star">
                <span class="menu-sales__text">Розпродаж</span>
              </a>
            </li>
            <li class="menu-sales__item">
              <a href="#" class="menu-sales__link">
                <img class="menu-sales__img" src="img/credit.svg" alt="star">
                <span class="menu-sales__text">Купити в кредит</span>
              </a>
            </li>
          </ul>
          <ul class="bottom-header__menu-categories menu-categories">
            <li class="menu-categories__item">
              <a href="" class="menu-categories__link">
                Дитяча
              </a>
            </li>
            <li class="menu-categories__item">
              <a href="" class="menu-categories__link">
                Кухня
              </a>
            </li>
            <li class="menu-categories__item">
              <a href="" class="menu-categories__link">
                Ванна
              </a>
            </li>
            <li class="menu-categories__item">
              <a href="" class="menu-categories__link">
                Спальня
              </a>
            </li>
            <li class="menu-categories__item">
              <a href="" class="menu-categories__link">
                Передпокій
              </a>
            </li>
            <li class="menu-categories__item">
              <a href="" class="menu-categories__link">
                Вітальня
              </a>
            </li>
            <li class="menu-categories__item">
              <a href="" class="menu-categories__link">
                Офіс
              </a>
            </li>
          </ul>
        </div>
      </div>
    </header>
    <main class="page">
    </main>
    <footer class="footer">
    </footer>
  </div>

</html>
