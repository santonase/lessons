<!DOCTYPE html>
<html lang="zxx">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <title>Lesson-14__forms</title>
</head>
<body>
  <header class="header">
  </header>
  <main class="page">
    <div class="page__container">
      <div class="page__info info">
        <div class="page__title-wrapper">
          <img src="img/icon-info.svg" alt="info" class="title__img">
          <h1 class="info__title title">
            Інформація про покупця
          </h1>
        </div>
        <div class="page__input input">
          <form action="#" class="input__form">
            <input type="text" class="input__surname" placeholder="Прізвище">
            <input type="text" class="input__tel" placeholder="Контактний телефон">
            <input type="text" class="input__name" placeholder="Ім’я">
            <input type="text" class="input__mail" placeholder="E-mail">
            <input type="text" class="input__father-name" placeholder="По батькові">
          </form>
        </div>
        <form action="#" class="info__choice">
          <label class="choice__checkbox checkbox">
            <input type="checkbox" class="checkbox__input">
            <span class="checkbox__text">Отримуватиме замовлення інша людина</span>
          </label>
        </form>
      </div>
      <div class="page__delivery delivery">
        <div class="page__title-wrapper">
          <img src="img/icon-delivery.svg" alt="info" class="title__img">
          <h1 class="info__title title">
            Вибір способу доставки
          </h1>
        </div>
        <form action="#" class="delivery__choice choice">
          <label class="choice__radio-label radio">
            <input type="radio" name="self" class="radio__input">
            <img src="img/radio-courier.svg" alt="check" class="radio__img">
            <span class="radio__text">Самовивіз із магазину</span>
            <span class="radio__sub-text">Бесплатно</span>
          </label>
          <label class="choice__radio-label radio">
            <input type="radio" name="self" class="radio__input">
            <img src="img/radio-np.svg" alt="new post" class="radio__img">
            <span class="radio__text">Доставка Нова Пошта</span>
            <span class="radio__sub-text">≈ від 500 грн</span>
          </label>
          <label class="choice__radio-label radio">
            <input type="radio" name="self" class="radio__input">
            <img src="img/radio-courier.svg" alt="courier" class="radio__img">
            <span class="radio__text">Доставка кур'єром</span>
            <span class="radio__sub-text">≈ від 200 грн</span>
          </label>
        </form>
        <div class="delivery__schedule schedule">
          <img src="img/schedule__location.svg" alt="icon" class="schedule__icon">
          <div class="schedule__text">
            <p class="schedule__time">
              Графік роботи: щодня з 9:00 до 18:00
            </p>
            <p class="schedule__address">
              м. Київ, пров. Ізяславський 52, пов. 2
            </p>
          </div>
          <div class="schedule__button button">
            <a href="#" class="button__link">
              <span class="button__text">На мапі</span>
            </a>
          </div>
        </div>
      </div>
      <div class="page__pay">
        <div class="page__title-wrapper">
          <img src="img/icon-pay.svg" alt="info" class="title__img">
          <h1 class="info__title title">
            Вибір способу оплати
          </h1>
        </div>
      </div>
      <div class="page__comment">
        <div class="page__title-wrapper">
          <img src="img/icon-comment.svg" alt="info" class="title__img">
          <h1 class="info__title title">
            Коментар до замовлення
          </h1>
        </div>
      </div>
    </div>
  </main>
  <footer class="footer">
  </footer>
</body>
</html>
